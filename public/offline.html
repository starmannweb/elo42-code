<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sem conexao — Elo 42</title>
    <style>
        body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#061a3a;color:#e7edf7;display:grid;place-items:center;min-height:100vh;padding:24px;text-align:center}
        .card{max-width:480px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:2.5rem 2rem;box-shadow:0 14px 44px rgba(0,0,0,.35)}
        h1{margin:0 0 12px;font-size:1.5rem}
        p{margin:0;color:#b7c6df;line-height:1.6;font-size:0.95rem}
        .icon{width:64px;height:64px;margin:0 auto 1.5rem;border-radius:50%;background:rgba(245,158,11,0.15);display:flex;align-items:center;justify-content:center}
        .btn{display:inline-block;margin-top:1.5rem;padding:0.625rem 1.5rem;background:#f59e0b;color:#1e293b;border-radius:8px;text-decoration:none;font-weight:600;font-size:0.875rem}
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"></line><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path><path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
        </div>
        <h1>Voce esta offline</h1>
        <p>Parece que voce perdeu a conexao com a internet. Verifique sua rede e tente novamente.</p>
        <a href="/" class="btn" onclick="window.location.reload();return false;">Tentar novamente</a>
    </div>
</body>
</html>
